<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Little Lemon</title>
        <meta name="description" content="A family-owned Mediterranean restaurant based in Chicago, Illinois">
        <meta name="author" content="Little Lemon Restaurant">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <link href="https://fonts.googleapis.com/css2?family=Markazi+Text&display=swap" rel="stylesheet">
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <header>
            <img src="images/logo.png" width="700px" height="250px">
        </header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="book.html">Book</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>

        <main>
            <div class="reserve">
                <h1> Book a table with us! </h1>
    
                <div class="forms">
                    <form class="form-section">
                        <h2>Reserver's Information</h2>
                        <div>
                            <label for="user_first_name"> First Name: </label>
                            <input type="text" id="user_first_name" name="user_first_name">
                        </div>

                        <div>
                            <label for="user_last_name"> Last Name: </label>
                            <input type="text" id="user_last_name" name="user_last_name">
                        </div>

                        <div>
                            <label for="user_email"> Email Address: </label>
                            <input type="email" id="user_email" name="user_email">
                        </div>

                        <div>
                            <label for="user_tel"> Phone Number: </label>
                            <input type="tel" id="user_tel" name="user_tel">
                        </div>
                    </form>

                    <form class="form-section">
                        <h2>Reservation Information</h2>

                        <div>
                            <label for="res_date"> Booking Date: </label>
                            <input type="date" id="res_date" name="res_date">
                        </div>

                        <div>
                            <label for="booking_people"> Number of People: </label>
                            <input type="range" id="booking_people" name="booking_people" min="1" max="10" value="4" oninput="this.nextElementSibling.value = this.value" style="accent-color: gold;">
                            <output>4</output>
                        </div>

                        <div>
                            <label for="booking_location"> Location: </label>
                            <input id="booking_location" name="booking_location" list="locations">
                            <datalist id="locations"
                                <option value="Uptown"> </option>
                                <option value="Downtown"> </option>
                            </datalist>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="reserve">
                <button type="reset" class="button_com"> Confirm Reservation </button
            </div>
        </main>

        <footer>
            <div>
                <img src="images/logo_footer.png" width="200px" height="250px">
            </div>

            <div>
                <p>Copyright Little Lemon
                    <br>254, Resi Street, Karen District, Nairobi City
                    <br>littlelemonrestaurant254@gmail.com
                </p>
            </div>
        </footer>
    </body>
</html>
